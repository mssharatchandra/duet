apiVersion: 1
datasources:
  - name: Duet Postgres
    uid: duet-pg
    type: postgres
    url: duet-postgres:5432
    user: duet
    jsonData:
      database: duet
      sslmode: disable
      postgresVersion: 1700
    secureJsonData:
      password: $DUET_PG_PASSWORD
  - name: Prometheus
    uid: duet-prom
    type: prometheus
    url: http://prometheus:9090
  - name: Loki
    uid: duet-loki
    type: loki
    url: http://loki:3100
