# Minimal Prometheus config. App metrics (/metrics on the Duet server) join in
# Phase 4 when a long-running process exists to scrape; benchmark-run metrics
# go to Postgres instead (short-lived processes and pull-based scraping don't
# mix — see DECISIONS.md 0007).
global:
  scrape_interval: 15s
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]
